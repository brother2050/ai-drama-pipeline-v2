# ============================================================
# 模型注册表 — 配置驱动的后端管理
# 修改此文件即可切换模型，无需改代码
# ============================================================

tts_backends:
  mimo-voicedesign:
    description: "MiMo VoiceDesign（云API，免费，自然语言描述生成声音）"
    requires_api_key: true
    api_key_env: "MIMO_API_KEY"
  mimo-voiceclone:
    description: "MiMo VoiceClone（云API，参考音频克隆声音）"
    requires_api_key: true
    api_key_env: "MIMO_API_KEY"
  gpt-sovits:
    description: "GPT-SoVITS（本地部署，开源）"
    requires_api_key: false
  cosyvoice:
    description: "CosyVoice（本地部署，多语言）"
    requires_api_key: false
  fish-speech:
    description: "Fish-Speech（本地部署，轻量）"
    requires_api_key: false

lipsync_backends:
  musetalk:
    description: "MuseTalk（本地部署，效果好）"
    requires_api_key: false
  sadtalker:
    description: "SadTalker（本地部署）"
    requires_api_key: false
  wav2lip:
    description: "Wav2Lip（本地部署，轻量）"
    requires_api_key: false

llm_backends:
  openai:
    description: "OpenAI 兼容 API（SiliconFlow / Zhipu / ...）"
    requires_api_key: true
  ollama:
    description: "Ollama（本地部署）"
    requires_api_key: false

music_backends:
  template:
    description: "ffmpeg 模板配乐（开箱即用）"
    requires_api_key: false

image_backends:
  sd15:
    workflow: "01_first_frame_sd15.json"
    default_params:
      width: 512
      height: 512
      steps: 20
      cfg_scale: 7.5
  flux:
    workflow: "01_first_frame_flux.json"
    default_params:
      width: 1024
      height: 576
      steps: 28
      cfg_scale: 3.5
  cosmos:
    workflow: "cosmos_predict2_2B_t2i.json"
    default_params:
      width: 1024
      height: 1024
      steps: 35
      cfg_scale: 4

video_backends:
  animatediff:
    workflow: "02_img2video.json"
    sampler_node: "KSampler"
    default_params:
      frames: 8
      fps: 8
      steps: 15
      denoise: 0.5
  cogvideox:
    workflow: "03_img2video_cogvideo.json"
    sampler_node: "CogVideoXSampler"
    default_params:
      frames: 16
      fps: 12
      steps: 20
      denoise: 0.55

