# ============================================================
# 模型注册表 — 配置驱动的后端管理
# 修改此文件即可切换模型，无需改代码
# ============================================================

tts_backends:
  mimo-voicedesign:
    description: "MiMo VoiceDesign（云API，免费，自然语言描述生成声音）"
    requires_api_key: true
    api_key_env: "MIMO_API_KEY"
  mimo-voiceclone:
    description: "MiMo VoiceClone（云API，参考音频克隆声音）"
    requires_api_key: true
    api_key_env: "MIMO_API_KEY"
  gpt-sovits:
    description: "GPT-SoVITS（本地部署，开源）"
    requires_api_key: false
  cosyvoice:
    description: "CosyVoice（本地部署，多语言）"
    requires_api_key: false
  fish-speech:
    description: "Fish-Speech（本地部署，轻量）"
    requires_api_key: false

lipsync_backends:
  musetalk:
    description: "MuseTalk（本地部署，效果好）"
    requires_api_key: false
  sadtalker:
    description: "SadTalker（本地部署）"
    requires_api_key: false
  wav2lip:
    description: "Wav2Lip（本地部署，轻量）"
    requires_api_key: false

llm_backends:
  openai:
    description: "OpenAI 兼容 API（SiliconFlow / Zhipu / ...）"
    requires_api_key: true
  ollama:
    description: "Ollama（本地部署）"
    requires_api_key: false

ip_adapter_models:
  # SD1.5 模型（放入 ComfyUI/models/ipadapter/）
  ip-adapter-plus-face_sd15:
    description: "Plus Face 模型 — 人物面部一致性最佳，适合短剧角色"
    file: "ip-adapter-plus-face_sd15.safetensors"
    clip_vision: "CLIP-ViT-H-14-laion2B-s32B-b79K.safetensors"
    base: "sd15"
  ip-adapter-plus_sd15:
    description: "Plus 通用模型 — 风格+内容保持，面部稍弱"
    file: "ip-adapter-plus_sd15.safetensors"
    clip_vision: "CLIP-ViT-H-14-laion2B-s32B-b79K.safetensors"
    base: "sd15"
  ip-adapter_sd15:
    description: "基础模型 — 影响最弱，仅做轻微参考"
    file: "ip-adapter_sd15.safetensors"
    clip_vision: "CLIP-ViT-H-14-laion2B-s32B-b79K.safetensors"
    base: "sd15"
  ip-adapter-full-face_sd15:
    description: "Full Face 模型 — 更强面部保持，但可能过度拟合"
    file: "ip-adapter-full-face_sd15.safetensors"
    clip_vision: "CLIP-ViT-H-14-laion2B-s32B-b79K.safetensors"
    base: "sd15"
  # SDXL 模型
  ip-adapter-plus-face_sdxl:
    description: "SDXL Plus Face — SDXL 面部一致性"
    file: "ip-adapter-plus-face_sdxl_vit-h.safetensors"
    clip_vision: "CLIP-ViT-bigG-14-laion2B-39B-b160k.safetensors"
    base: "sdxl"
  ip-adapter-plus_sdxl:
    description: "SDXL Plus 通用"
    file: "ip-adapter-plus_sdxl_vit-h.safetensors"
    clip_vision: "CLIP-ViT-bigG-14-laion2B-39B-b160k.safetensors"
    base: "sdxl"

pulid_flux_models:
  fpulid_flux:
    description: "PuLID Flux — Flux 面部一致性（推荐 weight=0.8-0.95）"
    file: "fpulid_flux.safetensors"
    folder: "pulid"
    requires:
      - name: "AntelopeV2"
        folder: "insightface/models/antelopev2"
        files: ["1k3d68.onnx", "2d106det.onnx", "genderage.onnx", "glintr100.onnx", "scrfd_10g_bnkps.onnx"]
      - name: "EVA02-CLIP-L-14-336"
        folder: "clip"
        auto_download: true
    base: "flux"
    install: "cd ComfyUI/custom_nodes && git clone https://github.com/balazik/ComfyUI-PuLID-Flux.git"

music_backends:
  template:
    description: "ffmpeg 模板配乐（开箱即用）"
    requires_api_key: false

image_backends:
  sd15:
    workflow: "01_first_frame_sd15.json"
    default_params:
      width: 512
      height: 512
      steps: 20
      cfg_scale: 7.5
  flux:
    workflow: "01_first_frame_flux.json"
    default_params:
      width: 1024
      height: 576
      steps: 28
      cfg_scale: 3.5
  cosmos:
    workflow: "cosmos_predict2_2B_t2i.json"
    default_params:
      width: 1024
      height: 576
      steps: 35
      cfg_scale: 4

video_backends:
  animatediff:
    workflow: "02_img2video.json"
    sampler_node: "KSampler"
    default_params:
      frames: 8
      fps: 8
      steps: 15
      denoise: 0.5
  cogvideox:
    workflow: "03_img2video_cogvideo.json"
    sampler_node: "CogVideoXSampler"
    default_params:
      width: 720
      height: 480
      frames: 16
      fps: 12
      steps: 20
      denoise: 0.55
  cosmos-video:
    workflow: "04_img2video_cosmos.json"
    sampler_node: "KSampler"
    default_params:
      width: 848
      height: 480
      frames: 93
      fps: 16
      steps: 35
      denoise: 1

