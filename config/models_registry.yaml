# ============================================================
# 模型注册表 — 配置驱动的后端管理
# 修改此文件即可切换模型，无需改代码
# ============================================================

image_backends:
  sd15:
    workflow: "01_first_frame_sd15.json"
    is_flux: false
    default_params:
      width: 512
      height: 512
      steps: 20
      cfg_scale: 7.5
  flux:
    workflow: "01_first_frame_flux.json"
    is_flux: true
    default_params:
      width: 1024
      height: 576
      steps: 28
      cfg_scale: 3.5

video_backends:
  animatediff:
    workflow: "02_img2video.json"
    sampler_node: "KSampler"
    default_params:
      frames: 8
      fps: 8
      steps: 15
      denoise: 0.5
  cogvideox:
    workflow: "03_img2video_cogvideo.json"
    sampler_node: "CogVideoXSampler"
    default_params:
      frames: 16
      fps: 12
      steps: 20
      denoise: 0.55

