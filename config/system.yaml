# ============================================================
# 系统全局配置 — 所有项目共享
# 项目级 project.yaml 可覆盖此处的值
# ============================================================

# ComfyUI 服务器地址
comfyui:
  url: "http://127.0.0.1:8188"
  timeout: 300
  api_key: ""

# 模型后端选择
models:
  image_backend: "sd15"
  video_backend: "animatediff"
  tts_backend: "mimo-voicedesign"
  lip_sync_backend: "musetalk"
  music_backend: "template"

  # TTS 服务地址
  gpt_sovits:
    api_url: "http://127.0.0.1:9880"

  # 口型同步服务地址
  musetalk:
    api_url: "http://127.0.0.1:8080"
  sadtalker:
    api_url: "http://127.0.0.1:8082"
  wav2lip:
    api_url: "http://127.0.0.1:8084"

# LLM 配置
llm:
  enabled: false
  backend: "openai"
  base_url: "https://api.siliconflow.cn"
  model: "Qwen/Qwen2.5-7B-Instruct"
  api_key: ""

# LoRA 训练
training:
  enabled: false
  backend: "fluxgym"
  api_url: "http://127.0.0.1:7860"
  poll_interval: 10
  defaults:
    steps: 1000
    learning_rate: 0.0001
    rank: 16
    resolution: "512x768"

# Web 服务器
server:
  port: 8888
  host: "0.0.0.0"
  cors_origin: "*"

# 后期合成
post_production:
  transition: "crossfade"
  transition_duration: 0.5
  bgm_volume: 0.15
  subtitle_platform: "douyin"

# 超时配置
timeouts:
  comfyui: 300
  tts: 60
  lipsync: 120
  llm: 300
  music: 120

# ============================================================
# 生成参数 — 用户自定义（不检测本地 GPU）
# 未配置则使用合理默认值；三方工具（ComfyUI 等）自行管理 GPU
# ============================================================
generation:
  resolution: [512, 512]    # [宽, 高] — 根据你的 ComfyUI 后端能力调整
  image_steps: 20           # 生图步数（越高越精细，越慢）
  video_frames: 8           # 视频帧数
  # image_backend: sd15     # 图像后端（sd15 / flux）
  # video_backend: animatediff  # 视频后端（animatediff / cogvideox）
