comfyui:
  url: http://127.0.0.1:8188
  api_key: ''
models:
  image_backend: cosmos
  video_backend: cosmos-video
  tts_backend: mimo-voicedesign
  lip_sync_backend: musetalk
  music_backend: template
  gpt_sovits:
    api_url: http://127.0.0.1:9880
  musetalk:
    api_url: http://127.0.0.1:8080
  sadtalker:
    api_url: http://127.0.0.1:8082
  wav2lip:
    api_url: http://127.0.0.1:8084
llm:
  enabled: false
  backend: openai
  base_url: https://api.siliconflow.cn
  model: Qwen/Qwen2.5-7B-Instruct
  api_key: ''
  # context_length: 32768  # 模型上下文长度（token 数，不填则自动检测。常见值：8K/32K/128K）
training:
  enabled: false
  backend: ai-toolkit
  api_url: http://127.0.0.1:7860
  api_key: ''
  poll_interval: 10
  defaults:
    steps: 600
    learning_rate: 0.0001
    rank: 16
    conv_dim: 16
    resolution: 512x768
    base_model: ostris/Flex.1-alpha
    arch: ''
    quantize_type: qfloat8
    timestep_type: sigmoid
    save_format: diffusers
    use_ema: false
server:
  port: 8888
  host: 0.0.0.0
  cors_origin: '*'
seko:
  api_key: ''
post_production:
  transition: crossfade
  transition_duration: 0.5
  bgm_volume: 0.15
  subtitle_platform: douyin
ip_adapter:
  enabled: true
  # IP-Adapter 模型（放入 ComfyUI/models/ipadapter/）
  # 推荐: ip-adapter-plus-face_sd15.safetensors（人物面部一致性最佳）
  # 可选: ip-adapter-plus_sd15.safetensors（通用，含风格）
  # 可选: ip-adapter_sd15.safetensors（基础，影响较弱）
  model: "ip-adapter-plus-face_sd15.safetensors"
  # CLIP Vision 模型（放入 ComfyUI/models/clip_vision/）
  # SD1.5 配 CLIP-ViT-H-14, SDXL 配 CLIP-ViT-bigG-14
  clip_vision: "CLIP-ViT-H-14-laion2B-s32B-b79K.safetensors"
  # 主角色参考图权重（0.0-1.0，越高越像参考图）
  weight: 0.75
  # 多角色时次要角色权重（自动计算或手动指定）
  secondary_weight: 0.45
  # 权重类型: linear / ease in / ease out / ease in-out / reverse / weak input / weak output / style transfer
  weight_type: "linear"
  # 融合方式: concat / add / subtract / average / norm / cosine
  combine_embeds: "concat"
  # IP-Adapter 生效的去噪范围
  start_at: 0.0
  end_at: 1.0
  # 嵌入缩放: all / v only / k+v (v only 对面部一致性最好)
  embeds_scaling: "V only"

timeouts:
  comfyui: 900
  tts: 60
  lipsync: 120
  llm: 300
  music: 120
# 分辨率和步数：默认使用各工作流 JSON 中的模型原生值，无需配置
# 如需覆盖比例，取消注释并修改（代码自动根据后端原生分辨率计算）：
# generation:
#   aspect_ratio: "16:9"      # 横屏（默认）
#   aspect_ratio: "9:16"      # 竖屏
#   aspect_ratio: "1:1"       # 方形
#   resolution: [576, 1024]   # 或精确值（优先级高于 aspect_ratio）
#   image_steps: 35           # 覆盖步数
